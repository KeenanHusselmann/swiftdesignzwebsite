<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080" />
<title>Post — 7 Active Clients Milestone · April 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0d0d0d;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }

  /* ── KEYFRAMES ── */
  @keyframes spin-slow  { to { transform: rotate(360deg); } }
  @keyframes spin-ccw   { to { transform: rotate(-360deg); } }
  @keyframes shimmer {
    0%   { background-position: -300% center; }
    100% { background-position:  300% center; }
  }
  @keyframes shimmer-teal {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes stat-pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50%       { transform: translate(-50%, -50%) scale(1.04); }
  }
  @keyframes ring-spin     { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
  @keyframes ring-spin-ccw  { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
  @keyframes progress {
    from { width: 0%; }
    to   { width: 100%; }
  }
  @keyframes amber-pulse {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 1.0; }
  }
  @keyframes dot-blink {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(245,158,11,0.8); }
    50%       { opacity: 0.4; box-shadow: 0 0 3px rgba(245,158,11,0.3); }
  }
  @keyframes chip-in {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── BACKGROUND ── */
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 85% 55% at 50% 33%, rgba(245,158,11,0.18) 0%, rgba(48,176,176,0.09) 42%, #0d0d0d 66%),
      radial-gradient(ellipse 45% 30% at 5% 92%,  rgba(48,176,176,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 45% 30% at 95% 8%,  rgba(245,158,11,0.06) 0%, transparent 55%),
      #0d0d0d;
  }
  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(60deg,  rgba(245,158,11,0.036) 0, rgba(245,158,11,0.036) 1px, transparent 1px, transparent 38px),
      repeating-linear-gradient(120deg, rgba(245,158,11,0.036) 0, rgba(245,158,11,0.036) 1px, transparent 1px, transparent 38px);
  }
  /* ambient glow behind ring area */
  .bg::after {
    content: '';
    position: absolute;
    top: 9%; left: 50%; transform: translateX(-50%);
    width: 950px; height: 750px;
    background: radial-gradient(ellipse, rgba(245,158,11,0.11) 0%, transparent 65%);
    filter: blur(90px);
    animation: amber-pulse 4s ease-in-out infinite;
  }

  /* ── DATE TAG ── */
  .date-tag {
    position: absolute;
    top: 80px; left: 0; right: 0;
    text-align: center;
    font-size: 22px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(245,158,11,0.5);
    animation: fadeUp 0.5s 0.1s ease both;
  }

  /* ── MILESTONE BADGE ── */
  .milestone-badge {
    position: absolute;
    top: 148px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px;
    padding: 14px 32px;
    border: 1px solid rgba(245,158,11,0.28);
    border-radius: 50px;
    background: rgba(245,158,11,0.06);
    backdrop-filter: blur(6px);
    white-space: nowrap;
    animation: fadeUp 0.5s 0.25s ease both;
  }
  .badge-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #F59E0B;
    animation: dot-blink 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  .badge-text {
    font-size: 19px; letter-spacing: 5px; text-transform: uppercase;
    color: rgba(245,158,11,0.65);
  }

  /* ── RING SYSTEM (centered at top:36%) ── */
  .ring {
    position: absolute;
    top: 36%; left: 50%;
    border-radius: 50%;
    border-style: solid;
    border-color: transparent;
  }
  .ring-1 {
    width: 720px; height: 720px;
    margin: -360px 0 0 -360px;
    border-width: 1px;
    border-color: rgba(245,158,11,0.14);
    animation: ring-spin-ccw 28s linear infinite;
  }
  .ring-2 {
    width: 600px; height: 600px;
    margin: -300px 0 0 -300px;
    border-width: 3px;
    background: conic-gradient(from 0deg, #F59E0B 0%, #30B0B0 50%, #F59E0B 100%) border-box;
    border-color: transparent;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: ring-spin 10s linear infinite;
  }
  .ring-3 {
    width: 460px; height: 460px;
    margin: -230px 0 0 -230px;
    border-width: 1px;
    border-color: rgba(48,176,176,0.2);
    border-style: dashed;
    animation: ring-spin-ccw 16s linear infinite;
  }
  .ring-4 {
    width: 340px; height: 340px;
    margin: -170px 0 0 -170px;
    border-width: 2px;
    border-color: rgba(245,158,11,0.17);
    animation: ring-spin 12s linear infinite;
  }

  /* ── ORBIT ARM + FAVICON ── */
  .orbit-arm {
    position: absolute;
    top: 36%; left: 50%;
    width: 600px; height: 600px;
    margin: -300px 0 0 -300px;
    border-radius: 50%;
    animation: spin-slow 10s linear infinite;
  }
  .orbit-fav {
    position: absolute;
    top: -44px; left: 50%;
    width: 88px; height: 88px;
    margin-left: -44px;
    border-radius: 22px;
    object-fit: cover;
    animation: spin-ccw 10s linear infinite;
    filter: drop-shadow(0 0 18px rgba(245,158,11,0.9)) drop-shadow(0 0 36px rgba(48,176,176,0.6));
  }

  /* ── CENTER STAT "7" ── */
  .center-stat {
    position: absolute;
    top: 36%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 310px;
    font-weight: 900;
    letter-spacing: -16px;
    line-height: 1;
    background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 38%, #30B0B0 72%, #FBBF24 100%);
    background-size: 300% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite, stat-pulse 3s ease-in-out infinite;
    z-index: 5;
  }

  /* ── STAT LABEL ── */
  .stat-label {
    position: absolute;
    top: 57.5%; left: 0; right: 0;
    text-align: center;
    font-size: 25px;
    letter-spacing: 7px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    animation: fadeUp 0.6s 0.55s ease both;
  }

  /* ── HEADLINE ── */
  .headline {
    position: absolute;
    top: 62%; left: 0; right: 0;
    text-align: center;
    font-size: 88px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    line-height: 1;
    animation: fadeUp 0.7s 0.7s ease both;
  }

  /* ── TEAL ACCENT LINE ── */
  .headline-teal {
    position: absolute;
    top: 70%; left: 0; right: 0;
    text-align: center;
    font-size: 88px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #30B0B0 0%, #7EDEDE 40%, #30B0B0 70%, #5ECECE 100%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer-teal 5s linear infinite, fadeUp 0.7s 0.85s ease both;
    line-height: 1;
  }

  /* ── REGION SUB-LINE ── */
  .region-line {
    position: absolute;
    top: 79%; left: 0; right: 0;
    text-align: center;
    font-size: 23px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    animation: fadeUp 0.6s 1.0s ease both;
  }

  /* ── REGION CHIPS ── */
  .chips {
    position: absolute;
    top: 83.5%; left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 22px;
  }
  .chip {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 36px;
    border: 1px solid rgba(48,176,176,0.28);
    border-radius: 60px;
    background: rgba(48,176,176,0.06);
    font-size: 22px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    opacity: 0;
    animation: chip-in 0.5s ease forwards;
  }
  .chip-code {
    font-size: 18px; letter-spacing: 2px;
    color: #30B0B0;
    font-weight: 700;
    opacity: 0.85;
  }
  .chip:nth-child(1) { animation-delay: 1.15s; }
  .chip:nth-child(2) { animation-delay: 1.35s; }

  /* ── DIVIDER ── */
  .divider {
    position: absolute;
    top: 88%; left: 50%;
    width: 300px; height: 2px;
    transform: translateX(-50%);
    background: linear-gradient(90deg, transparent, #F59E0B, #30B0B0, transparent);
    animation: fadeUp 0.7s 1.5s ease both;
  }

  /* ── URL ── */
  .url {
    position: absolute;
    top: 89.5%; left: 0; right: 0;
    text-align: center;
    font-size: 34px;
    font-weight: 700;
    color: #30B0B0;
    letter-spacing: 3px;
    text-shadow: 0 0 28px rgba(48,176,176,0.8);
    animation: fadeUp 0.7s 1.6s ease both;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    position: absolute;
    bottom: 120px; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #F59E0B, #30B0B0);
    animation: progress 15s linear infinite;
    opacity: 0.35;
  }

  /* ── FOOTER ── */
  .footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to right, rgba(245,158,11,0.1), rgba(48,176,176,0.1));
    border-top: 1px solid rgba(245,158,11,0.15);
    display: flex; align-items: center; justify-content: center; gap: 20px;
    opacity: 0;
    animation: fadeUp 0.7s 1.8s ease forwards;
  }
  .footer-dot {
    width: 6px; height: 6px;
    background: #F59E0B;
    border-radius: 50%;
    opacity: 0.6;
  }
  .footer-text {
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>

  <div class="bg"></div>

  <div class="date-tag">April 11, 2026</div>

  <!-- concentric rings -->
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="ring ring-4"></div>

  <!-- orbiting favicon on ring-2 path -->
  <div class="orbit-arm">
    <img src="images/favicon.png" alt="" class="orbit-fav" />
  </div>

  <!-- center stat -->
  <div class="center-stat">7</div>

  <!-- content below rings -->
  <div class="stat-label">Active Clients &amp; Counting</div>

  <div class="headline">Building Across</div>
  <div class="headline-teal">2 Nations.</div>

  <div class="region-line">Namibia &nbsp;·&nbsp; South Africa &nbsp;·&nbsp; 100% Remote</div>

  <div class="chips">
    <div class="chip"><span class="chip-code">NA</span> Namibia</div>
    <div class="chip"><span class="chip-code">ZA</span> South Africa</div>
  </div>

  <div class="divider"></div>
  <div class="url">swiftdesignz.co.za</div>

  <div class="progress-bar"></div>

  <div class="footer">
    <span class="footer-dot"></span>
    <span class="footer-text">@swiftdesignz101</span>
    <span class="footer-dot"></span>
    <span class="footer-text">Web · Apps · E-Commerce</span>
    <span class="footer-dot"></span>
  </div>

</body>
</html>
