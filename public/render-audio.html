<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Swift Designz — SFX Audio Export</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --teal: #30B0B0; --bg: #04090D; }
  body {
    background: var(--bg); color: #ccc;
    font-family: 'Courier New', monospace;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 20px; padding: 40px;
  }
  h1 { color: var(--teal); font-size: 18px; letter-spacing: 4px; text-transform: uppercase; }
  p  { font-size: 12px; letter-spacing: 2px; color: #666; }
  #status { color: var(--teal); font-size: 13px; letter-spacing: 2px; min-height: 20px; }
  #bar-wrap {
    width: 360px; height: 4px; background: #111;
    border-radius: 2px; overflow: hidden;
  }
  #bar {
    height: 100%; width: 0%; background: var(--teal);
    box-shadow: 0 0 12px var(--teal);
    transition: width 0.1s linear;
  }
  #dl { display: none; }
  #dl a {
    display: inline-block; padding: 10px 28px;
    border: 1px solid var(--teal); color: var(--teal);
    text-decoration: none; font-size: 12px; letter-spacing: 3px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  #dl a:hover { background: rgba(48,176,176,0.12); }
</style>
</head>
<body>
<h1>Swift Designz — SFX Render</h1>
<p>Synthesizing 52 seconds of audio offline — please wait</p>
<div id="bar-wrap"><div id="bar"></div></div>
<div id="status">Starting OfflineAudioContext…</div>
<div id="dl"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  OFFLINE AUDIO RENDERER
//  Exactly mirrors the SFX engine in immersive-tunnel-post.html.
//  All timestamps are pre-computed in milliseconds then converted
//  to seconds for the OfflineAudioContext scheduler.
//
//  Card timing derivation:
//    Card N: loadCard(N) call time (ms)
//    enter delay: 800ms (zoom-in, card 0) | 480ms (slide cards 1–3)
//    hl1 length × 82ms/char  +  380ms pause
//    hl2 length × 82ms/char  +  380ms pause
//    sub length × 95ms/char  +  0ms  →  onDone
//    visible 4000ms  →  transitionBurst  →  exit 540ms  →  next card
// ═══════════════════════════════════════════════════════════

const SR       = 44100;
const DUR_SEC  = 52;
const barEl    = document.getElementById('bar');
const statusEl = document.getElementById('status');
const dlEl     = document.getElementById('dl');

// ── Helpers ─────────────────────────────────────────────────
const s = ms => ms / 1000;              // ms → seconds

// ── Pre-computed event timestamps (ms from page start) ──────
//
// CARD 0  loadCard(0) at t=1400ms  (enterDelay=800)
//   hl1 "CODE IS OUR"    11 chars × 82ms, first at 2200
//   hl2 "SUPERPOWER."    11 chars × 82ms, first at 3400  (last hl1 = 3020, +380)
//   sub "We ship ideas at the speed of light"  35 chars × 95ms, first at 4600  (last hl2 = 4220, +380)
//   last sub char = 4600+34×95 = 7830  →  pills at 7890,8070,8250,8430,8610
//   visible ends = 7830+4000 = 11830  →  boom×2  →  loadCard(1) = 11830+540 = 12370
//
// CARD 1  loadCard(1) at t=12370ms  (enterDelay=480)
//   hl1 "YOUR VISION"    11 chars × 82ms, first at 12850
//   hl2 "DELIVERED."     10 chars × 82ms, first at 14050  (last hl1=13670, +380)
//   sub "From concept to launch, beautifully built"  41 chars × 95ms, first at 15168  (last hl2=14788, +380)
//   last sub = 15168+40×95 = 18968  →  pills at 19028,19208,19388,19568,19748
//   visible ends = 22968  →  loadCard(2) = 23508
//
// CARD 2  loadCard(2) at t=23508ms  (enterDelay=480)
//   hl1 "BUILT FOR"      9 chars × 82ms, first at 23988
//   hl2 "GROWTH."        7 chars × 82ms, first at 25024  (last hl1=24644, +380)
//   sub "Scalable stores and apps that work around the clock"  51 chars × 95ms, first at 25896  (last hl2=25516, +380)
//   last sub = 25896+50×95 = 30646  →  pills at 30706,30886,31066,31246,31426
//   visible ends = 34646  →  loadCard(3) = 35186
//
// CARD 3  loadCard(3) at t=35186ms  (enterDelay=480)
//   hl1 "START YOUR"     10 chars × 82ms, first at 35666
//   hl2 "PROJECT."       8 chars × 82ms, first at 36784  (last hl1=36404, +380)
//   sub "Get a free quote — swiftdesignz.co.za"  37 chars × 95ms, first at 37738  (last hl2=37358, +380)
//   last sub = 37738+36×95 = 41158  →  NO pills, CTA only
//   visible ends = 45158  →  showLogoOutro at 45698
//
// LOGO OUTRO  at t=45698ms
//   rocketFlyIn  at 45698
//   logoPulse×2  at 47148, 48198
//   warpOut      at 49248

function buildTimestamps() {
  const clicks = [], pills = [];

  // ── Card 0 ──
  for (let i = 0; i < 11; i++) clicks.push(2200 + i * 82);   // hl1
  for (let i = 0; i < 11; i++) clicks.push(3400 + i * 82);   // hl2
  for (let i = 0; i < 35; i++) clicks.push(4600 + i * 95);   // sub
  for (let i = 0; i <  5; i++) pills.push({ t: 7890 + i * 180, i });

  // ── Card 1 ──
  for (let i = 0; i < 11; i++) clicks.push(12850 + i * 82);
  for (let i = 0; i < 10; i++) clicks.push(14050 + i * 82);
  for (let i = 0; i < 41; i++) clicks.push(15168 + i * 95);
  for (let i = 0; i <  5; i++) pills.push({ t: 19028 + i * 180, i });

  // ── Card 2 ──
  for (let i = 0; i <  9; i++) clicks.push(23988 + i * 82);
  for (let i = 0; i <  7; i++) clicks.push(25024 + i * 82);
  for (let i = 0; i < 51; i++) clicks.push(25896 + i * 95);
  for (let i = 0; i <  5; i++) pills.push({ t: 30706 + i * 180, i });

  // ── Card 3 ──
  for (let i = 0; i < 10; i++) clicks.push(35666 + i * 82);
  for (let i = 0; i <  8; i++) clicks.push(36784 + i * 82);
  for (let i = 0; i < 37; i++) clicks.push(37738 + i * 95);
  // no pills on card 3

  const explosions = [11830, 12070, 22968, 23208, 34646, 34886, 45158, 45398];
  const whooshes   = [1400, 12370, 23508, 35186];

  return { clicks, pills, explosions, whooshes };
}

// ── WAV encoder ──────────────────────────────────────────────
function encodeWav(buffer) {
  const numCh   = buffer.numberOfChannels;
  const sr      = buffer.sampleRate;
  const len     = buffer.length;
  const bytes   = len * numCh * 2;          // 16-bit PCM
  const ab      = new ArrayBuffer(44 + bytes);
  const view    = new DataView(ab);
  const str     = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };

  str(0,  'RIFF');  view.setUint32(4,  36 + bytes, true);
  str(8,  'WAVE');
  str(12, 'fmt ');  view.setUint32(16, 16, true);
  view.setUint16(20, 1,              true); // PCM
  view.setUint16(22, numCh,          true);
  view.setUint32(24, sr,             true);
  view.setUint32(28, sr * numCh * 2, true); // byteRate
  view.setUint16(32, numCh * 2,      true); // blockAlign
  view.setUint16(34, 16,             true); // bitsPerSample
  str(40, 'data');  view.setUint32(40, bytes, true);

  let off = 44;
  for (let i = 0; i < len; i++) {
    for (let ch = 0; ch < numCh; ch++) {
      const v = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
      view.setInt16(off, v < 0 ? v * 0x8000 : v * 0x7FFF, true);
      off += 2;
    }
  }
  return new Uint8Array(ab);
}

// ── Main render ──────────────────────────────────────────────
async function render() {
  const oac    = new OfflineAudioContext(2, SR * DUR_SEC, SR);
  const master = oac.createGain();
  master.gain.value = 0.72;
  master.connect(oac.destination);

  const { clicks, pills, explosions, whooshes } = buildTimestamps();

  // — Ambient drone (full duration) —
  function schedAmbient() {
    const o1  = oac.createOscillator();
    const o2  = oac.createOscillator();
    const lfo = oac.createOscillator();
    const lfoG = oac.createGain();
    const flt = oac.createBiquadFilter();
    const g   = oac.createGain();
    o1.type = 'sine';  o1.frequency.value = 58;
    o2.type = 'sine';  o2.frequency.value = 62.4;
    lfo.type = 'sine'; lfo.frequency.value = 0.12;
    lfoG.gain.value = 6;
    flt.type = 'lowpass'; flt.frequency.value = 180;
    g.gain.setValueAtTime(0.001, 0);
    g.gain.linearRampToValueAtTime(0.14, 2.5);
    lfo.connect(lfoG); lfoG.connect(o1.frequency);
    o1.connect(flt); o2.connect(flt);
    flt.connect(g); g.connect(master);
    o1.start(0); o1.stop(DUR_SEC);
    o2.start(0); o2.stop(DUR_SEC);
    lfo.start(0); lfo.stop(DUR_SEC);
  }

  // — Noise burst helper —
  function schedNoise(t, dur, bandFreq, q, gainVal) {
    const buf = oac.createBuffer(1, Math.ceil(SR * dur), SR);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = oac.createBufferSource(); src.buffer = buf;
    const flt = oac.createBiquadFilter(); flt.type = 'bandpass';
    flt.frequency.value = bandFreq; flt.Q.value = q;
    const g = oac.createGain();
    g.gain.setValueAtTime(gainVal, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(flt); flt.connect(g); g.connect(master);
    src.start(t); src.stop(t + dur);
  }

  // — typeClick —
  function schedClick(t) {
    const o = oac.createOscillator();
    const g = oac.createGain();
    o.type = 'square';
    o.frequency.value = 1100 + Math.random() * 500;
    g.gain.setValueAtTime(0.028, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.028);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.03);
  }

  // — Whoosh in —
  function schedWhoosh(t) {
    const dur = 0.48;
    const o   = oac.createOscillator();
    const flt = oac.createBiquadFilter();
    const g   = oac.createGain();
    o.type = 'sawtooth';
    flt.type = 'bandpass'; flt.Q.value = 2.5;
    o.frequency.setValueAtTime(220, t);
    o.frequency.linearRampToValueAtTime(1600, t + dur);
    flt.frequency.setValueAtTime(300, t);
    flt.frequency.linearRampToValueAtTime(2800, t + dur);
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.18, t + dur * 0.3);
    g.gain.linearRampToValueAtTime(0.001, t + dur);
    o.connect(flt); flt.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur);
  }

  // — Explosion thud —
  function schedExplosion(t) {
    const o = oac.createOscillator();
    const g = oac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(180, t);
    o.frequency.exponentialRampToValueAtTime(28, t + 0.42);
    g.gain.setValueAtTime(0.55, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.45);
    schedNoise(t, 0.22, 380, 1.2, 0.28);
  }

  // — Pill ascending ping —
  function schedPill(t, i) {
    const freq = 480 + i * 95;
    const o = oac.createOscillator();
    const g = oac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(freq * 1.6, t);
    o.frequency.exponentialRampToValueAtTime(freq, t + 0.07);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.18);
  }

  // — Rocket fly-in —
  function schedRocket(t) {
    const dur = 1.4;
    const o   = oac.createOscillator();
    const flt = oac.createBiquadFilter();
    const g   = oac.createGain();
    o.type    = 'sawtooth';
    flt.type  = 'lowpass';
    o.frequency.setValueAtTime(90,  t);
    o.frequency.linearRampToValueAtTime(240, t + dur * 0.65);
    o.frequency.linearRampToValueAtTime(160, t + dur);
    flt.frequency.setValueAtTime(350,  t);
    flt.frequency.linearRampToValueAtTime(1600, t + dur * 0.65);
    flt.frequency.linearRampToValueAtTime(1000, t + dur);
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.28, t + dur * 0.18);
    g.gain.linearRampToValueAtTime(0.18, t + dur);
    o.connect(flt); flt.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur + 0.05);
    // landing thud
    const lt = t + dur - 0.08;
    const o2 = oac.createOscillator();
    const g2 = oac.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(210, lt);
    o2.frequency.exponentialRampToValueAtTime(38, lt + 0.48);
    g2.gain.setValueAtTime(0.62, lt);
    g2.gain.exponentialRampToValueAtTime(0.001, lt + 0.48);
    o2.connect(g2); g2.connect(master);
    o2.start(lt); o2.stop(lt + 0.5);
    schedNoise(lt, 0.2, 450, 1.5, 0.35);
  }

  // — Logo pulse —
  function schedPulse(t) {
    const o = oac.createOscillator();
    const g = oac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(200, t);
    o.frequency.linearRampToValueAtTime(420, t + 0.5);
    o.frequency.linearRampToValueAtTime(200, t + 1.0);
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.25);
    g.gain.linearRampToValueAtTime(0.001, t + 1.0);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 1.05);
  }

  // — Warp out —
  function schedWarp(t) {
    const dur = 0.9;
    const o   = oac.createOscillator();
    const flt = oac.createBiquadFilter();
    const g   = oac.createGain();
    o.type = 'sawtooth';
    flt.type = 'bandpass'; flt.Q.value = 4;
    o.frequency.setValueAtTime(280, t);
    o.frequency.exponentialRampToValueAtTime(3800, t + dur * 0.55);
    o.frequency.exponentialRampToValueAtTime(80,   t + dur);
    flt.frequency.setValueAtTime(600, t);
    flt.frequency.exponentialRampToValueAtTime(7000, t + dur * 0.5);
    g.gain.setValueAtTime(0.22, t);
    g.gain.linearRampToValueAtTime(0.38, t + dur * 0.4);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(flt); flt.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur + 0.05);
  }

  // ── Schedule everything ──────────────────────────────────
  statusEl.textContent = 'Scheduling audio events…';
  barEl.style.width    = '10%';

  schedAmbient();
  whooshes.forEach(ms       => schedWhoosh(s(ms)));
  clicks.forEach(ms         => schedClick(s(ms)));
  pills.forEach(({ t, i }) => schedPill(s(t), i));
  explosions.forEach(ms     => schedExplosion(s(ms)));

  // Logo outro events (ms from t=45698)
  schedRocket(s(45698));
  schedPulse(s(47148));
  schedPulse(s(48198));
  schedWarp(s(49248));

  // ── Render ───────────────────────────────────────────────
  statusEl.textContent = 'Rendering offline (this takes a few seconds)…';
  barEl.style.width    = '30%';

  // Drive a fake progress bar while rendering
  let prog = 30;
  const ticker = setInterval(() => {
    prog = Math.min(90, prog + 2);
    barEl.style.width = prog + '%';
  }, 300);

  const rendered = await oac.startRendering();
  clearInterval(ticker);

  statusEl.textContent = 'Encoding WAV…';
  barEl.style.width    = '92%';

  // Yield to repaint
  await new Promise(r => setTimeout(r, 30));

  const wav  = encodeWav(rendered);
  const blob = new Blob([wav], { type: 'audio/wav' });
  const url  = URL.createObjectURL(blob);
  const mb   = (blob.size / (1024 * 1024)).toFixed(2);

  barEl.style.width    = '100%';
  statusEl.textContent = `Done — ${DUR_SEC}s stereo WAV @ 44.1 kHz · ${mb} MB`;

  dlEl.innerHTML = `<a href="${url}" download="swift-designz-sfx.wav">⬇ Download swift-designz-sfx.wav</a>`;
  dlEl.style.display = 'block';

  // Auto-trigger download
  const a = document.createElement('a');
  a.href = url; a.download = 'swift-designz-sfx.wav';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

render().catch(err => {
  statusEl.textContent = 'Error: ' + err.message;
  console.error(err);
});
</script>
</body>
</html>
