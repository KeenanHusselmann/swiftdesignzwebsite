<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swift Designz — Instagram Promo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:      #30B0B0;
    --teal-dim:  #509090;
    --teal-deep: #307070;
    --black:     #080e0e;
    --near-black:#101010;
  }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: var(--black);
    font-family: 'Inter', sans-serif;
  }

  canvas#stars {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .nebula {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(48,176,176,0.13) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(48,112,112,0.10) 0%, transparent 70%);
    animation: nebulaPulse 8s ease-in-out infinite alternate;
  }
  @keyframes nebulaPulse {
    from { opacity: 0.7; }
    to   { opacity: 1; }
  }

  .grid {
    position: absolute;
    inset: 0;
    z-index: 2;
    background-image:
      linear-gradient(rgba(48,176,176,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(48,176,176,0.04) 1px, transparent 1px);
    background-size: 54px 54px;
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift {
    from { background-position: 0 0; }
    to   { background-position: 54px 54px; }
  }

  .scanline {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(48,176,176,0.35), transparent);
    z-index: 10;
    animation: scan 4s linear infinite;
    top: 0;
  }
  @keyframes scan {
    from { top: -2px; }
    to   { top: 1082px; }
  }

  .frame {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
  }

  .frame::before {
    content: '';
    position: absolute;
    inset: 18px;
    border: 1px solid rgba(48,176,176,0.18);
    border-radius: 4px;
    box-shadow: inset 0 0 60px rgba(48,176,176,0.04), 0 0 40px rgba(48,176,176,0.06);
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    z-index: 11;
    animation: cornerGlow 3s ease-in-out infinite alternate;
  }
  @keyframes cornerGlow {
    from { opacity: 0.5; }
    to   { opacity: 1; filter: drop-shadow(0 0 6px var(--teal)); }
  }
  .corner.tl { top: 18px; left: 18px; border-top: 2px solid var(--teal); border-left: 2px solid var(--teal); }
  .corner.tr { top: 18px; right: 18px; border-top: 2px solid var(--teal); border-right: 2px solid var(--teal); }
  .corner.bl { bottom: 18px; left: 18px; border-bottom: 2px solid var(--teal); border-left: 2px solid var(--teal); }
  .corner.br { bottom: 18px; right: 18px; border-bottom: 2px solid var(--teal); border-right: 2px solid var(--teal); }

  .logo-wrap {
    position: relative;
    margin-bottom: 32px;
    animation: logoEntrance 1.2s cubic-bezier(0.23,1,0.32,1) both;
  }
  @keyframes logoEntrance {
    from { opacity: 0; transform: scale(0.6) translateY(-30px); filter: blur(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }
  .logo-glow {
    position: absolute;
    inset: -20px;
    background: radial-gradient(circle, rgba(48,176,176,0.25) 0%, transparent 70%);
    animation: logoGlowPulse 2.5s ease-in-out infinite alternate;
    border-radius: 50%;
  }
  @keyframes logoGlowPulse {
    from { opacity: 0.5; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1.1); }
  }
  .logo-img {
    height: 90px;
    width: auto;
    position: relative;
    filter: drop-shadow(0 0 18px rgba(48,176,176,0.7));
  }
  @keyframes logoGlowCycle {
    from { filter: drop-shadow(0 0 18px rgba(48,176,176,0.7)); }
    50%  { filter: drop-shadow(0 0 28px rgba(48,176,176,1)); }
    to   { filter: drop-shadow(0 0 18px rgba(48,176,176,0.7)); }
  }

  .headline {
    font-family: 'Orbitron', sans-serif;
    font-size: 62px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
    text-align: center;
    color: #fff;
    text-shadow: 0 0 40px rgba(48,176,176,0.5);
    animation: headlineReveal 1s 0.5s cubic-bezier(0.23,1,0.32,1) both;
    margin-bottom: 18px;
  }
  .headline span {
    color: var(--teal);
    text-shadow: 0 0 30px rgba(48,176,176,0.9), 0 0 60px rgba(48,176,176,0.4);
    animation: neonFlicker 5s 2s ease-in-out infinite;
  }
  @keyframes headlineReveal {
    from { opacity: 0; transform: translateY(40px); letter-spacing: 12px; }
    to   { opacity: 1; transform: translateY(0); letter-spacing: -1px; }
  }
  @keyframes neonFlicker {
    0%, 95%, 100% { opacity: 1; }
    96%            { opacity: 0.7; }
    97%            { opacity: 1; }
    98%            { opacity: 0.5; }
    99%            { opacity: 1; }
  }

  .sub {
    font-size: 18px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--teal-dim);
    text-align: center;
    animation: fadeUp 1s 0.9s both;
    margin-bottom: 48px;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pills {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-bottom: 52px;
  }
  .pill {
    background: rgba(48,176,176,0.08);
    border: 1px solid rgba(48,176,176,0.3);
    color: var(--teal);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    opacity: 0;
    transform: scale(0.7);
    animation: pillPop 0.6s cubic-bezier(0.23,1,0.32,1) forwards, pillGlow 4s ease-in-out infinite alternate;
  }
  @keyframes pillPop {
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes pillGlow {
    from { box-shadow: 0 0 0 rgba(48,176,176,0); border-color: rgba(48,176,176,0.3); }
    to   { box-shadow: 0 0 16px rgba(48,176,176,0.25); border-color: rgba(48,176,176,0.7); }
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent);
    margin: 0 auto 40px;
    animation: dividerExpand 1s 1.8s both;
    width: 0;
  }
  @keyframes dividerExpand {
    from { width: 0; opacity: 0; }
    to   { width: 120px; opacity: 1; }
  }

  .cta-block {
    text-align: center;
    animation: fadeUp 1s 2s both;
  }
  .cta-label {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--teal-dim);
    margin-bottom: 8px;
  }
  .cta-url {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(48,176,176,0.5);
  }
  .cta-url span { color: var(--teal); }

  .handle {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(80,144,144,0.7);
    white-space: nowrap;
    animation: fadeUp 1s 2.4s both;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(48,176,176,0.15), transparent 70%);
    animation: orbFloat var(--dur, 8s) ease-in-out infinite alternate;
    z-index: 3;
    pointer-events: none;
  }
  @keyframes orbFloat {
    from { transform: translateY(0) scale(1); opacity: 0.5; }
    to   { transform: translateY(-40px) scale(1.1); opacity: 0.9; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="nebula"></div>
<div class="grid"></div>
<div class="scanline"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="orb" style="width:300px;height:300px;top:-80px;left:-80px;--dur:9s;"></div>
<div class="orb" style="width:200px;height:200px;bottom:50px;right:-60px;--dur:11s;animation-delay:2s;"></div>
<div class="orb" style="width:150px;height:150px;top:40%;left:5%;--dur:7s;animation-delay:1s;"></div>

<div class="frame">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <img class="logo-img" src="images/logo.png" alt="Swift Designz"/>
  </div>

  <div class="headline">CRAFT YOUR<br/><span>DIGITAL EDGE</span></div>
  <div class="sub">Where Ideas Become Digital Reality</div>

  <div class="pills">
    <div class="pill" style="animation-delay:1.4s,3.4s">Web Design</div>
    <div class="pill" style="animation-delay:1.55s,3.55s">E-Commerce</div>
    <div class="pill" style="animation-delay:1.7s,3.7s">Mobile Apps</div>
    <div class="pill" style="animation-delay:1.85s,3.85s">AI Training</div>
    <div class="pill" style="animation-delay:2s,4s">PM Training</div>
  </div>

  <div class="divider"></div>

  <div class="cta-block">
    <div class="cta-label">Get started today</div>
    <div class="cta-url"><span>swift</span>designz.co.za</div>
  </div>
</div>

<div class="handle">@swiftdesignz101</div>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = 1080;
canvas.height = 1080;

const stars = Array.from({length: 220}, () => ({
  x: Math.random() * 1080,
  y: Math.random() * 1080,
  r: Math.random() * 1.4 + 0.2,
  speed: Math.random() * 0.15 + 0.03,
  opacity: Math.random() * 0.7 + 0.2,
  twinkleSpeed: Math.random() * 0.02 + 0.005,
  twinkleOffset: Math.random() * Math.PI * 2,
}));

const brightStars = Array.from({length: 12}, () => ({
  x: Math.random() * 1080,
  y: Math.random() * 1080,
  r: Math.random() * 2 + 1.5,
  speed: Math.random() * 0.06 + 0.01,
  opacity: Math.random() * 0.4 + 0.5,
  twinkleSpeed: Math.random() * 0.03 + 0.01,
  twinkleOffset: Math.random() * Math.PI * 2,
}));

let t = 0;
function drawStars() {
  ctx.clearRect(0, 0, 1080, 1080);
  t += 1;
  [...stars, ...brightStars].forEach(s => {
    const opacity = s.opacity * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 240, 240, ${opacity})`;
    ctx.shadowBlur = s.r > 1.5 ? 8 : 0;
    ctx.shadowColor = '#30B0B0';
    ctx.fill();
    ctx.shadowBlur = 0;
    s.y += s.speed;
    if (s.y > 1082) { s.y = -2; s.x = Math.random() * 1080; }
  });
  requestAnimationFrame(drawStars);
}
drawStars();
</script>
</body>
</html>
