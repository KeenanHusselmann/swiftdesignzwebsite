<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080" />
<title>Swift Designz — Don't Settle. Strive.</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    background: #050505;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }

  .post {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    position: relative;
    background: #080808;
  }

  /* ═══════════════════ KEYFRAMES ═══════════════════ */

  @keyframes spin-cw  { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
  @keyframes spin-ccw { from { transform: rotate(0deg); }   to { transform: rotate(-360deg); } }

  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in-down {
    from { opacity: 0; transform: translateY(-40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes settle-in {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes strikethru {
    from { width: 0; }
    to   { width: 94%; }
  }

  @keyframes divider-sweep {
    from { opacity: 0; transform: scaleX(0); }
    to   { opacity: 1; transform: scaleX(1); }
  }

  @keyframes diamond-appear {
    from { opacity: 0; transform: rotate(45deg) scale(0); }
    to   { opacity: 1; transform: rotate(45deg) scale(1); }
  }

  @keyframes strive-blast {
    0%   { opacity: 0; transform: scale(0.72) translateY(70px);
           filter: drop-shadow(0 0 120px rgba(48,176,176,1)) drop-shadow(0 0 80px rgba(245,158,11,.9)); }
    60%  { filter: drop-shadow(0 0 40px rgba(48,176,176,.7)) drop-shadow(0 0 60px rgba(245,158,11,.5)); }
    100% { opacity: 1; transform: scale(1) translateY(0);
           filter: drop-shadow(0 0 24px rgba(48,176,176,.55)) drop-shadow(0 0 40px rgba(245,158,11,.4)); }
  }

  @keyframes underline-grow {
    from { width: 0; opacity: 0; }
    to   { width: 740px; opacity: 1; }
  }

  @keyframes shimmer {
    0%   { background-position: -300% center; }
    100% { background-position:  300% center; }
  }

  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 0 24px rgba(48,176,176,.55)) drop-shadow(0 0 40px rgba(245,158,11,.4)); }
    50%       { filter: drop-shadow(0 0 48px rgba(48,176,176,.9))  drop-shadow(0 0 80px rgba(245,158,11,.65)); }
  }

  @keyframes fav-pulse {
    0%, 100% {
      filter: drop-shadow(0 0 20px rgba(245,158,11,.65)) drop-shadow(0 0 40px rgba(48,176,176,.35));
    }
    50% {
      filter: drop-shadow(0 0 40px rgba(245,158,11,1))   drop-shadow(0 0 80px rgba(48,176,176,.65));
    }
  }

  @keyframes neon-border {
    0%, 100% { box-shadow: 0 0 18px rgba(48,176,176,.28), 0 0 40px rgba(48,176,176,.12); }
    50%       { box-shadow: 0 0 36px rgba(48,176,176,.65), 0 0 80px rgba(48,176,176,.28); }
  }

  /* ═══════════════════ BACKGROUND ═══════════════════ */

  /* Deep red haze — top (the "less" world) */
  .bg-haze-top {
    position: absolute;
    top: -160px; left: 50%;
    transform: translateX(-50%);
    width: 1000px; height: 900px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,18,18,.38) 0%, rgba(60,10,10,.2) 40%, transparent 72%);
    filter: blur(80px);
    pointer-events: none;
  }

  /* Teal glow — bottom (the "best" world) */
  .bg-haze-bottom {
    position: absolute;
    bottom: -160px; left: 50%;
    transform: translateX(-50%);
    width: 1080px; height: 1000px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(48,176,176,.22) 0%, rgba(245,158,11,.1) 38%, transparent 70%);
    filter: blur(90px);
    pointer-events: none;
    animation: glow-pulse 4s ease-in-out infinite;
  }

  /* ═══════════════════ SETTLE SECTION — top half ═══════════════════ */

  .settle-section {
    position: absolute;
    top: 200px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* "THE OLD WAY" eyebrow */
  .settle-eyebrow {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 12px;
    text-transform: uppercase;
    color: rgba(255,255,255,.22);
    margin-bottom: 52px;
    opacity: 0;
    animation: fade-in-down .9s ease .4s forwards;
  }

  /* Main dim text — "Don't Settle For Less." */
  .settle-text {
    font-size: 136px;
    font-weight: 900;
    text-align: center;
    line-height: 1.05;
    letter-spacing: -3px;
    text-transform: uppercase;
    color: rgba(255,255,255,.16);
    padding: 0 40px;
    position: relative;
    opacity: 0;
    animation: settle-in .9s ease .7s forwards;
  }

  /* Red strikethrough — draws left to right after text appears */
  .settle-text::after {
    content: '';
    position: absolute;
    top: 46%;
    left: 3%;
    height: 7px;
    width: 0;
    background: linear-gradient(90deg,
      rgba(160,28,28,0),
      rgba(210,40,40,.85) 15%,
      rgba(240,60,60,.95) 50%,
      rgba(210,40,40,.85) 85%,
      rgba(160,28,28,0));
    border-radius: 4px;
    box-shadow: 0 0 14px rgba(200,35,35,.6), 0 0 36px rgba(200,35,35,.25);
    animation: strikethru 1.4s cubic-bezier(.4,0,.2,1) 2.0s forwards;
  }

  /* ═══════════════════ CENTRE DIVIDER ═══════════════════ */

  .divider {
    position: absolute;
    top: 948px;
    left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    transform-origin: center;
    opacity: 0;
    animation: divider-sweep .7s cubic-bezier(.4,0,.2,1) 3.2s forwards;
  }

  .div-line {
    height: 2px;
    width: 310px;
    background: linear-gradient(90deg, transparent, rgba(48,176,176,.7) 50%, transparent);
    box-shadow: 0 0 14px rgba(48,176,176,.5);
  }
  .div-line.amber {
    background: linear-gradient(90deg, transparent, rgba(245,158,11,.7) 50%, transparent);
    box-shadow: 0 0 14px rgba(245,158,11,.5);
  }

  .div-diamond {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, #30B0B0, #F59E0B);
    transform: rotate(45deg) scale(0);
    box-shadow: 0 0 22px rgba(48,176,176,.7), 0 0 50px rgba(245,158,11,.35);
    animation: diamond-appear .5s cubic-bezier(.16,1,.3,1) 3.6s forwards;
  }

  /* ═══════════════════ STRIVE SECTION — bottom half ═══════════════════ */

  .strive-section {
    position: absolute;
    top: 1000px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 0 40px;
  }

  /* "THE SWIFT WAY" eyebrow */
  .strive-eyebrow {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 12px;
    text-transform: uppercase;
    color: #30B0B0;
    margin-bottom: 52px;
    opacity: 0;
    animation: fade-in-up .8s ease 3.5s forwards;
  }

  /* Main blazing text — "Strive For The Best." */
  .strive-text {
    font-size: 148px;
    font-weight: 900;
    text-align: center;
    line-height: 1.02;
    letter-spacing: -4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 25%, #30B0B0 55%, #70D8D8 80%, #F59E0B 100%);
    background-size: 250% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation:
      strive-blast 1.1s cubic-bezier(.16,1,.3,1) 3.8s forwards,
      glow-pulse 3.5s ease-in-out infinite 5.5s,
      shimmer 6s linear infinite 5.5s;
  }

  /* Neon underline that draws after text lands */
  .strive-underline {
    height: 4px;
    width: 0;
    background: linear-gradient(90deg, #F59E0B, #30B0B0 50%, #F59E0B);
    border-radius: 2px;
    box-shadow: 0 0 18px rgba(48,176,176,.7), 0 0 50px rgba(245,158,11,.4);
    margin-top: 36px;
    opacity: 0;
    animation: underline-grow 1s cubic-bezier(.4,0,.2,1) 5.0s forwards;
  }

  /* ═══════════════════ BRAND FOOTER ═══════════════════ */

  .brand-footer {
    position: absolute;
    bottom: 90px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    opacity: 0;
    animation: fade-in-up .9s ease 5.8s forwards;
  }

  /* Favicon badge */
  .fav-badge {
    position: relative;
    width: 130px; height: 130px;
  }
  .fav-badge .ring-a {
    position: absolute;
    top: 50%; left: 50%;
    width: 122px; height: 122px;
    margin-top: -61px; margin-left: -61px;
    border-radius: 50%;
    border: 2px solid rgba(48,176,176,.45);
    animation: spin-cw 7s linear infinite;
  }
  .fav-badge .ring-b {
    position: absolute;
    top: 50%; left: 50%;
    width: 136px; height: 136px;
    margin-top: -68px; margin-left: -68px;
    border-radius: 50%;
    border: 1.5px solid rgba(245,158,11,.3);
    animation: spin-ccw 10s linear infinite;
  }
  .fav-badge img {
    position: absolute;
    top: 50%; left: 50%;
    width: 82px; height: 82px;
    margin-top: -41px; margin-left: -41px;
    object-fit: cover;
    animation: fav-pulse 3s ease-in-out infinite;
  }

  .brand-name {
    font-size: 54px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-align: center;
    background: linear-gradient(90deg, #F59E0B 0%, #FBBF24 28%, #30B0B0 58%, #F59E0B 100%);
    background-size: 220% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 5s linear infinite 6.5s;
  }

  .brand-url {
    font-size: 30px;
    font-weight: 700;
    color: rgba(255,255,255,.38);
    letter-spacing: 3px;
  }

  /* Subtle teal border frame around the whole post */
  .post::after {
    content: '';
    position: absolute;
    inset: 18px;
    border-radius: 24px;
    border: 1px solid rgba(48,176,176,.1);
    pointer-events: none;
    animation: neon-border 5s ease-in-out infinite 6s;
  }
</style>
</head>
<body>

<div id="post-slogan" class="post">

  <!-- Background atmosphere -->
  <div class="bg-haze-top"></div>
  <div class="bg-haze-bottom"></div>

  <!-- ── SETTLE — the old way ── -->
  <div class="settle-section">
    <div class="settle-eyebrow">The Old Way</div>
    <div class="settle-text">Don't<br>Settle<br>For Less.</div>
  </div>

  <!-- ── Centre divider ── -->
  <div class="divider">
    <div class="div-line"></div>
    <div class="div-diamond"></div>
    <div class="div-line amber"></div>
  </div>

  <!-- ── STRIVE — the Swift way ── -->
  <div class="strive-section">
    <div class="strive-eyebrow">The Swift Way</div>
    <div class="strive-text">Strive<br>For The<br>Best.</div>
    <div class="strive-underline"></div>
  </div>

  <!-- ── Brand footer ── -->
  <div class="brand-footer">
    <div class="fav-badge">
      <div class="ring-a"></div>
      <div class="ring-b"></div>
      <img src="images/favicon.png" alt="Swift Designz" />
    </div>
    <div class="brand-name">SWIFT DESIGNZ</div>
    <div class="brand-url">swiftdesignz.co.za</div>
  </div>

</div>

</body>
</html>
