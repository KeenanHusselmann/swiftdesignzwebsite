<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Swift Designz — Mobile Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#30B0B0;--teal-dim:#509090;--teal-deep:#307070;--red:rgba(220,70,70,1);--red-bg:rgba(180,45,45,0.11);--red-border:rgba(200,60,60,0.22);}
html,body{width:390px;height:844px;overflow:hidden;background:#020609;font-family:'Inter',sans-serif;position:relative;}

/* ── CANVAS ── */
canvas{position:absolute;inset:0;z-index:0;}

/* ── ATMOSPHERE ── */
.atm-top{position:absolute;top:0;left:0;right:0;height:502px;z-index:1;
  background:linear-gradient(180deg,rgba(70,5,5,0.32) 0%,rgba(30,4,4,0.14) 55%,transparent 100%);
  pointer-events:none;}
.atm-bot{position:absolute;top:500px;left:0;right:0;bottom:0;z-index:1;
  background:linear-gradient(180deg,rgba(48,176,176,0.07) 0%,rgba(48,176,176,0.03) 100%);
  pointer-events:none;}

/* ── CORNERS ── */
.corner{position:absolute;width:20px;height:20px;z-index:26;opacity:0.55;}
.tl{top:57px;left:13px;border-top:1.5px solid var(--teal);border-left:1.5px solid var(--teal);}
.tr{top:57px;right:13px;border-top:1.5px solid var(--teal);border-right:1.5px solid var(--teal);}
.bl{bottom:47px;left:13px;border-bottom:1.5px solid var(--teal);border-left:1.5px solid var(--teal);}
.br{bottom:47px;right:13px;border-bottom:1.5px solid var(--teal);border-right:1.5px solid var(--teal);}

/* ── STATUS BAR ── */
.sb{position:absolute;top:0;left:0;right:0;height:44px;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;background:rgba(2,6,9,0.52);
  border-bottom:1px solid rgba(48,176,176,0.07);}
.sb-time{font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px;}
.sb-icons{display:flex;align-items:center;gap:6px;}
/* signal bars */
.sig{display:flex;gap:2px;align-items:flex-end;height:14px;}
.sig span{display:block;width:3px;background:rgba(255,255,255,0.85);border-radius:1px;}
.sig span:nth-child(1){height:4px;opacity:.4;}
.sig span:nth-child(2){height:7px;opacity:.7;}
.sig span:nth-child(3){height:10px;}
.sig span:nth-child(4){height:13px;}
/* wifi */
.wifi{width:14px;height:10px;position:relative;}
.wifi::before,.wifi::after,.wifi i{position:absolute;border:1.5px solid rgba(255,255,255,0.8);border-radius:50%;left:50%;transform:translateX(-50%);border-bottom:none;border-left:none;border-right:none;}
.wifi::before{width:14px;height:7px;top:0;}
.wifi::after{width:8px;height:4px;top:3px;}
.wifi i{display:block;width:3px;height:3px;background:rgba(255,255,255,0.8);border:none;border-radius:50%;bottom:0;transform:translateX(-50%);}
/* battery */
.bat{width:22px;height:11px;border:1.5px solid rgba(255,255,255,0.75);border-radius:2px;position:relative;margin-left:1px;}
.bat::after{content:'';position:absolute;top:1px;left:1px;right:3px;bottom:1px;background:rgba(255,255,255,0.9);border-radius:1px;}
.bat::before{content:'';position:absolute;right:-4px;top:2.5px;width:2.5px;height:6px;background:rgba(255,255,255,0.5);border-radius:0 2px 2px 0;}

/* ── DIVIDER ── */
.divider{position:absolute;top:500px;left:0;right:0;height:2px;z-index:25;
  background:linear-gradient(90deg,transparent,var(--teal) 18%,var(--teal) 82%,transparent);
  box-shadow:0 0 18px rgba(48,176,176,0.55),0 -1px 10px rgba(48,176,176,0.12);}

/* ── PROBLEM SECTION ── */
.problem{position:absolute;top:44px;left:0;right:0;height:456px;z-index:20;
  padding:30px 32px 20px;display:flex;flex-direction:column;justify-content:center;}
.p-eyebrow{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;
  text-transform:uppercase;color:rgba(225,100,100,0.70);margin-bottom:16px;
  display:flex;align-items:center;gap:10px;}
.p-eyebrow::before{content:'';display:inline-block;width:22px;height:1px;background:rgba(210,70,70,0.55);}
.p-headline{font-family:'Orbitron',sans-serif;font-weight:900;color:#fff;line-height:.97;
  letter-spacing:-0.5px;}
.p-l1{font-size:44px;display:block;}
.p-l2{font-size:44px;display:block;color:rgba(255,255,255,0.75);}
.p-sub{font-size:13.5px;font-weight:400;color:rgba(205,205,205,0.65);
  line-height:1.55;margin-top:15px;max-width:310px;}

/* Stat box */
.stat-box{margin-top:20px;display:flex;align-items:flex-start;gap:14px;
  background:var(--red-bg);border:1px solid var(--red-border);
  border-radius:10px;padding:14px 16px;
  box-shadow:inset 0 0 28px rgba(180,40,40,0.05);}
.stat-num{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;
  color:#df7a7a;white-space:nowrap;line-height:1;
  text-shadow:0 0 22px rgba(210,70,70,0.45);}
.stat-label{font-size:11.5px;color:rgba(205,155,155,0.68);line-height:1.45;padding-top:4px;}

/* Promo box (card 4) */
.promo-box{margin-top:20px;display:inline-flex;align-items:center;gap:10px;
  background:rgba(48,176,176,0.10);border:1px solid rgba(48,176,176,0.30);
  border-radius:10px;padding:13px 20px;}
.promo-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);
  box-shadow:0 0 10px var(--teal);flex-shrink:0;}
.promo-txt{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;
  text-transform:uppercase;color:var(--teal-dim);}

/* ── SOLUTION SECTION ── */
.solution{position:absolute;top:502px;left:0;right:0;height:298px;z-index:20;
  padding:24px 32px 18px;display:flex;flex-direction:column;justify-content:center;}
.s-eyebrow{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;
  text-transform:uppercase;color:var(--teal-dim);margin-bottom:11px;
  display:flex;align-items:center;gap:9px;}
.s-eyebrow::before{content:'◉';color:var(--teal);font-size:9px;}
.s-headline{font-family:'Orbitron',sans-serif;font-size:23px;font-weight:700;
  color:var(--teal);line-height:1.22;
  text-shadow:0 0 22px rgba(48,176,176,0.38);}
.s-sub{font-size:13px;color:rgba(155,215,215,0.65);margin-top:9px;line-height:1.48;}
.s-price{margin-top:9px;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
  color:rgba(255,255,255,0.82);letter-spacing:.8px;
  text-shadow:0 0 14px rgba(48,176,176,0.30);}
.s-cta{margin-top:14px;display:inline-block;
  background:var(--teal);color:#021212;
  font-family:'Orbitron',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;padding:9px 22px;border-radius:999px;
  box-shadow:0 0 22px rgba(48,176,176,0.42),0 4px 14px rgba(0,0,0,0.3);}

/* ── FOOTER ── */
.footer{position:absolute;bottom:0;left:0;right:0;height:44px;z-index:30;
  display:flex;align-items:center;justify-content:space-between;padding:0 26px;
  background:rgba(2,6,9,0.55);border-top:1px solid rgba(48,176,176,0.09);}
.f-brand{display:flex;align-items:center;gap:8px;}
.f-logo{width:24px;height:24px;border-radius:50%;
  border:1.5px solid rgba(48,176,176,0.55);object-fit:cover;
  box-shadow:0 0 9px rgba(48,176,176,0.45);background:#fff;}
.f-name{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  color:var(--teal);letter-spacing:.8px;}
.f-url{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;
  color:rgba(80,144,144,0.52);}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="atm-top"></div>
<div class="atm-bot"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="divider"></div>

<!-- Status Bar -->
<div class="sb">
  <div class="sb-time">9:41</div>
  <div class="sb-icons">
    <div class="sig"><span></span><span></span><span></span><span></span></div>
    <div class="wifi"><i></i></div>
    <div class="bat"></div>
  </div>
</div>

<!-- Problem Section -->
<div class="problem" id="problem"></div>

<!-- Solution Section -->
<div class="solution" id="solution"></div>

<!-- Footer -->
<div class="footer">
  <div class="f-brand">
    <img class="f-logo" src="images/favicon.png" alt="Swift Designz"/>
    <span class="f-name">SWIFT DESIGNZ</span>
  </div>
  <span class="f-url">swiftdesignz.co.za</span>
</div>

<script>
// ── CANVAS (390×844) ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width = 390, H = canvas.height = 844;
const cx = W/2, cy = H/2;
const TR=48, TG=176, TB=176;
const N_STARS=360, MAX_Z=900;

function mkStar(init){
  const z=init?Math.random()*MAX_Z:MAX_Z;
  return{x:(Math.random()-.5)*W*1.9,y:(Math.random()-.5)*H*1.9,z,pz:z,size:.3+Math.random()*1.6,col:Math.random()};
}
let stars=Array.from({length:N_STARS},()=>mkStar(true));
let warpSpd=4.2,frame=0,scanY=0,comets=[],blasts=[],lastComet=0,streaks=[],lastStreak=0;

const HUD=[
  {r:210,rot:0,rotSpd:.0022,segs:4,gapFrac:.3,lw:.6,a:.065},
  {r:155,rot:2.1,rotSpd:-.0038,segs:3,gapFrac:.38,lw:.5,a:.048},
];

function mkComet(){
  const side=Math.floor(Math.random()*4);
  let sx,sy;
  if(side===0){sx=Math.random()*W;sy=-15;}
  else if(side===1){sx=W+15;sy=Math.random()*H;}
  else if(side===2){sx=Math.random()*W;sy=H+15;}
  else{sx=-15;sy=Math.random()*H;}
  const tx=cx+(Math.random()-.5)*340,ty=cy+(Math.random()-.5)*580;
  const dx=tx-sx,dy=ty-sy,d=Math.sqrt(dx*dx+dy*dy)||1,spd=4+Math.random()*6;
  return{x:sx,y:sy,vx:(dx/d)*spd,vy:(dy/d)*spd,px:-(dy/d),py:(dx/d),
    zAmp:12+Math.random()*38,zFreq:.055+Math.random()*.09,zPhase:Math.random()*Math.PI*2,
    trail:[],t:0,ttl:50+Math.floor(Math.random()*70)};
}
function boom(x,y){
  const n=10+Math.floor(Math.random()*16);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2+Math.random()*.6,spd=.8+Math.random()*5.5;
    blasts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,
      decay:.018+Math.random()*.03,size:.4+Math.random()*2.4,flash:Math.random()>.62});
  }
}

function render(ts){
  frame++;if(warpSpd<5.4)warpSpd+=.007;
  ctx.fillStyle='rgba(2,6,9,0.88)';ctx.fillRect(0,0,W,H);
  const breathe=.5+.5*Math.sin(frame*.018);
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,130+breathe*40);
  cg.addColorStop(0,`rgba(${TR},${TG},${TB},${.042+breathe*.028})`);
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);

  for(const s of stars){
    s.pz=s.z;s.z-=warpSpd;
    if(s.z<=1){s.x=(Math.random()-.5)*W*1.9;s.y=(Math.random()-.5)*H*1.9;s.z=MAX_Z;s.pz=MAX_Z;continue;}
    const sx=(s.x/s.z)*cx+cx,sy=(s.y/s.z)*cy+cy,px=(s.x/s.pz)*cx+cx,py=(s.y/s.pz)*cy+cy;
    if(sx<-10||sx>W+10||sy<-10||sy>H+10){s.z=1;continue;}
    const t=1-s.z/MAX_Z,alpha=Math.min(1,t*1.7+.04),lw=s.size*(.4+t*1.6);
    ctx.save();
    ctx.strokeStyle=`rgba(${TR},${TG},${TB},${alpha})`;ctx.lineWidth=lw;
    if(t>.65){ctx.shadowBlur=lw*5;ctx.shadowColor=`rgba(${TR},${TG},${TB},.5)`;}
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(sx,sy);ctx.stroke();
    ctx.restore();
  }

  for(const h of HUD){
    h.rot+=h.rotSpd;
    ctx.save();ctx.globalAlpha=h.a*(.5+.5*breathe);
    ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;ctx.lineWidth=h.lw;
    const span=(Math.PI*2/h.segs)*(1-h.gapFrac);
    for(let i=0;i<h.segs;i++){
      const st=h.rot+i*(Math.PI*2/h.segs);
      ctx.beginPath();ctx.arc(cx,cy,h.r,st,st+span);ctx.stroke();
    }
    ctx.restore();
  }

  if(ts-lastStreak>700+Math.random()*900){
    const ang=Math.random()*Math.PI*2,fr=40+Math.random()*60,tr=fr+50+Math.random()*110;
    streaks.push({x1:cx+Math.cos(ang)*fr,y1:cy+Math.sin(ang)*fr,
      x2:cx+Math.cos(ang)*tr,y2:cy+Math.sin(ang)*tr,life:1,lw:.7+Math.random()*1.2});
    lastStreak=ts;
  }
  streaks=streaks.filter(function(s){s.life-=.05;if(s.life<=0)return false;
    ctx.save();ctx.globalAlpha=s.life*.75;ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;
    ctx.lineWidth=s.lw;ctx.shadowBlur=7;ctx.shadowColor=`rgba(${TR},${TG},${TB},.85)`;
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();ctx.restore();
    return true;
  });

  if(ts-lastComet>2000+Math.random()*3200){comets.push(mkComet());lastComet=ts;}
  for(let i=comets.length-1;i>=0;i--){
    const c=comets[i];c.t++;
    const zOff=c.zAmp*Math.sin(c.zFreq*c.t+c.zPhase),hx=c.x+c.px*zOff,hy=c.y+c.py*zOff;
    c.trail.push({x:hx,y:hy});if(c.trail.length>22)c.trail.shift();
    c.x+=c.vx;c.y+=c.vy;
    const alive=c.t<c.ttl&&hx>-60&&hx<W+60&&hy>-60&&hy<H+60;
    if(!alive){boom(hx,hy);comets.splice(i,1);continue;}
    const fade=1-c.t/c.ttl;
    for(let j=1;j<c.trail.length;j++){
      const tf=j/c.trail.length;
      ctx.save();ctx.globalAlpha=tf*.78*fade;ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;
      ctx.lineWidth=tf*2;ctx.shadowBlur=tf*12;ctx.shadowColor=`rgba(${TR},${TG},${TB},.8)`;
      ctx.beginPath();ctx.moveTo(c.trail[j-1].x,c.trail[j-1].y);ctx.lineTo(c.trail[j].x,c.trail[j].y);
      ctx.stroke();ctx.restore();
    }
    ctx.save();ctx.globalAlpha=fade*.92;ctx.fillStyle='rgba(200,250,250,1)';
    ctx.shadowBlur=18;ctx.shadowColor=`rgba(${TR},${TG},${TB},1)`;
    ctx.beginPath();ctx.arc(hx,hy,2.3,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  for(let i=blasts.length-1;i>=0;i--){
    const p=blasts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.91;p.vy*=.91;p.life-=p.decay;
    if(p.life<=0){blasts.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.life*(p.flash?.88:.50);
    ctx.fillStyle=p.flash?'rgba(200,252,252,1)':`rgba(${TR},${TG},${TB},1)`;
    if(p.flash){ctx.shadowBlur=10;ctx.shadowColor=`rgba(${TR},${TG},${TB},1)`;}
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  scanY=(scanY+1.2)%H;
  ctx.save();ctx.globalAlpha=.04;ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,scanY);ctx.lineTo(W,scanY);ctx.stroke();ctx.restore();

  // centre pulse
  const dp=.5+.5*Math.sin(frame*.045);
  ctx.save();ctx.globalAlpha=.45+.45*dp;ctx.fillStyle=`rgba(${TR},${TG},${TB},1)`;
  ctx.shadowBlur=24;ctx.shadowColor=`rgba(${TR},${TG},${TB},1)`;
  ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();ctx.restore();

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── CARD DATA ────────────────────────────────────────────────────────────────
const CARDS = [
  {
    eyebrow: 'THE PROBLEM',
    l1: 'INVISIBLE', l2: 'ONLINE.',
    sub: "If they can't find you, they won't hire you. Most small businesses have zero professional web presence.",
    stat: { num: '73%', label: 'of visitors leave a poorly built site in under 3 seconds' },
    promo: null,
    fixLabel: 'WHAT SWIFT DOES',
    fixHead: 'Professional Website',
    fixSub:  'Custom-built, fast, mobile-first. Live in 2–4 weeks.',
    price: 'From R2,500',
    cta: 'GET A QUOTE',
  },
  {
    eyebrow: 'THE PROBLEM',
    l1: 'BROKEN', l2: 'ON PHONES.',
    sub: "Your site looks broken on mobile. That's exactly where your clients are browsing — right now.",
    stat: { num: '60%+', label: 'of all web traffic today comes from mobile devices' },
    promo: null,
    fixLabel: 'WHAT SWIFT DOES',
    fixHead: 'Mobile-First Design',
    fixSub:  'Every site we build is flawless on every screen — no exceptions.',
    price: 'From R2,500',
    cta: 'GO MOBILE-FIRST',
  },
  {
    eyebrow: 'THE PROBLEM',
    l1: 'OUTPACED', l2: 'BY RIVALS.',
    sub: "Your competitor just launched a slick app. You're still taking orders over WhatsApp.",
    stat: { num: 'R5K', label: 'is all it takes to launch your custom MVP app with Swift' },
    promo: null,
    fixLabel: 'WHAT SWIFT DOES',
    fixHead: 'Custom App Development',
    fixSub:  'iOS, Android or Web — built around your exact business process.',
    price: 'From R5,000',
    cta: 'BUILD YOUR APP',
  },
  {
    eyebrow: 'THE PROBLEM',
    l1: 'WASTING', l2: 'HOURS.',
    sub: "Manual tasks that software could handle in seconds. Every admin hour is an hour not growing.",
    stat: { num: '20h+', label: 'lost every week on tasks a custom system could fully automate' },
    promo: null,
    fixLabel: 'WHAT SWIFT DOES',
    fixHead: 'Process Automation',
    fixSub:  "We build the system that does the work — so you don't have to.",
    price: 'From R5,000',
    cta: 'AUTOMATE IT',
  },
  {
    eyebrow: 'THE COST OF WAITING',
    l1: 'DELAY', l2: 'COSTS MORE.',
    sub: "Every month offline is revenue you'll never recover. Stop waiting — start building.",
    stat: null,
    promo: 'LIMITED — APRIL 2026',
    fixLabel: 'APRIL 2026 ONLY',
    fixHead: 'FREE 3-Month Hosting',
    fixSub:  'New website clients this month get 3 months hosting completely free.',
    price: null,
    cta: 'CLAIM YOUR OFFER',
  },
];

// ── RENDER CARD ───────────────────────────────────────────────────────────────
const q   = new URLSearchParams(window.location.search);
const idx = Math.min(Math.max(parseInt(q.get('card') || '0', 10), 0), CARDS.length - 1);
const d   = CARDS[idx];

document.getElementById('problem').innerHTML = `
  <div class="p-eyebrow">${d.eyebrow}</div>
  <div class="p-headline">
    <span class="p-l1">${d.l1}</span>
    <span class="p-l2">${d.l2}</span>
  </div>
  <p  class="p-sub">${d.sub}</p>
  ${d.stat ? `
  <div class="stat-box">
    <div class="stat-num">${d.stat.num}</div>
    <div class="stat-label">${d.stat.label}</div>
  </div>` : ''}
  ${d.promo ? `
  <div class="promo-box">
    <div class="promo-dot"></div>
    <div class="promo-txt">${d.promo}</div>
  </div>` : ''}
`;

document.getElementById('solution').innerHTML = `
  <div class="s-eyebrow">${d.fixLabel}</div>
  <div class="s-headline">${d.fixHead}</div>
  <div class="s-sub">${d.fixSub}</div>
  ${d.price ? `<div class="s-price">${d.price}</div>` : ''}
  <div class="s-cta">${d.cta} &rarr;</div>
`;
</script>
</body>
</html>
