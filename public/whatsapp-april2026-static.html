<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Swift Designz — April 2026 Static</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --teal: #30B0B0; --teal-dim: #509090; --teal-deep: #307070; }

  html { width: 1080px; height: 1080px; overflow: hidden; background: #04090D; }
  body {
    width: 1080px; height: 1080px;
    overflow: hidden; background: #04090D;
    font-family: 'Inter', sans-serif;
    position: relative;
  }

  canvas { position: absolute; inset: 0; z-index: 0; }

  .vignette {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 45%, rgba(2,6,8,0.28) 100%);
  }

  .corner {
    position: absolute; width: 40px; height: 40px; z-index: 25; pointer-events: none;
    opacity: 0.7;
  }
  .corner.tl { top:22px; left:22px;   border-top:2px solid var(--teal); border-left:2px solid var(--teal); }
  .corner.tr { top:22px; right:22px;  border-top:2px solid var(--teal); border-right:2px solid var(--teal); }
  .corner.bl { bottom:22px; left:22px;  border-bottom:2px solid var(--teal); border-left:2px solid var(--teal); }
  .corner.br { bottom:22px; right:22px; border-bottom:2px solid var(--teal); border-right:2px solid var(--teal); }

  .status {
    position: absolute; top: 34px; right: 68px; z-index: 26;
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--teal); box-shadow: 0 0 10px var(--teal);
  }
  .status-txt {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase; color: var(--teal-dim);
  }

  .data-left, .data-right {
    position: absolute; top: 50%; z-index: 22;
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    letter-spacing: 1.5px; color: rgba(48,176,176,0.25); pointer-events: none;
  }
  .data-left  { left:28px;  transform:translateY(-50%) rotate(180deg); writing-mode:vertical-lr; }
  .data-right { right:28px; transform:translateY(-50%); writing-mode:vertical-rl; }

  /* ── OVERLAY & CARD ── */
  .overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none; overflow: hidden;
  }

  .card {
    position: relative; width: 720px;
    background: rgba(4,15,22,0.18);
    border: 1px solid rgba(48,176,176,0.28);
    border-radius: 18px; padding: 38px 56px 34px;
    text-align: center;
    box-shadow: 0 0 60px rgba(48,176,176,0.12), inset 0 0 80px rgba(48,176,176,0.04), 0 0 0 1px rgba(48,176,176,0.06);
  }
  .card::before { content:''; position:absolute; top:-1px; left:14%; right:14%; height:1px; background:linear-gradient(90deg,transparent,var(--teal),transparent); }
  .card::after  { content:''; position:absolute; bottom:-1px; left:28%; right:28%; height:1px; background:linear-gradient(90deg,transparent,var(--teal-deep),transparent); }

  /* ── BADGE ── */
  .svc-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(48,176,176,0.10); border: 1px solid rgba(48,176,176,0.28);
    border-radius: 999px; padding: 5px 16px; margin-bottom: 16px;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 6px var(--teal); }
  .badge-txt { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--teal-dim); }

  /* ── LOGO ── */
  .logo-wrap { position: relative; display: block; width: 70px; height: 70px; margin: 0 auto 20px; }
  .logo-halo {
    position: absolute; inset: -28px; border-radius: 50%;
    background: radial-gradient(circle, rgba(48,176,176,0.26) 0%, transparent 65%);
    opacity: 0.8;
  }
  .logo-img {
    height: 70px; width: 70px; position: relative;
    filter: drop-shadow(0 0 14px rgba(48,176,176,0.85));
    mix-blend-mode: multiply;
    animation: logoSpin 8s linear infinite;
  }
  @keyframes logoSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* ── PROMO TAG ── */
  .promo-tag {
    display: inline-block;
    font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: #0a1a1a; background: var(--teal);
    padding: 6px 18px; border-radius: 999px; margin-bottom: 18px;
    box-shadow: 0 0 20px rgba(48,176,176,0.6), 0 0 40px rgba(48,176,176,0.25);
  }

  /* ── HEADLINE ── */
  .headline {
    font-family: 'Orbitron', sans-serif; font-size: 50px; font-weight: 900;
    color: #fff; line-height: 1.08; letter-spacing: -0.5px;
    text-shadow: 0 0 40px rgba(48,176,176,0.3); margin-bottom: 12px;
  }
  .headline em {
    font-style: normal; color: var(--teal); display: block;
    text-shadow: 0 0 20px rgba(48,176,176,0.9),0 0 50px rgba(48,176,176,0.4);
    animation: glowBreath 4s ease-in-out infinite alternate;
  }
  @keyframes glowBreath {
    from { text-shadow: 0 0 18px rgba(48,176,176,0.65),0 0 40px rgba(48,176,176,0.25); }
    to   { text-shadow: 0 0 30px rgba(48,176,176,1),0 0 70px rgba(48,176,176,0.55),0 0 120px rgba(48,176,176,0.18); }
  }

  .sub {
    font-size: 11px; font-weight: 700; letter-spacing: 4.5px;
    text-transform: uppercase; color: var(--teal-dim); margin-bottom: 24px;
  }

  .divider { height: 1px; width: 180px; margin: 0 auto 22px; background: linear-gradient(90deg,transparent,var(--teal),transparent); }

  /* ── TIERS ── */
  .pricing { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .tier-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px; border: 1px solid rgba(48,176,176,0.18);
    border-radius: 8px; background: rgba(48,176,176,0.05);
  }
  .tier-name { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(80,144,144,0.85); }
  .tier-price { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; color: var(--teal); text-shadow: 0 0 10px rgba(48,176,176,0.5); }

  /* ── BEFORE / AFTER ── */
  .ba-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .ba-row { display: flex; align-items: center; gap: 10px; justify-content: center; }
  .ba-before {
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    letter-spacing: 2px; padding: 7px 12px; border-radius: 7px; text-transform: uppercase;
    color: rgba(80,144,144,0.55); border: 1px solid rgba(80,144,144,0.18);
    background: rgba(80,144,144,0.04); text-decoration: line-through;
    text-decoration-color: rgba(80,144,144,0.4);
  }
  .ba-arrow { color: var(--teal); font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; text-shadow: 0 0 8px rgba(48,176,176,0.5); flex-shrink: 0; }
  .ba-after {
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    letter-spacing: 2px; padding: 7px 12px; border-radius: 7px; text-transform: uppercase;
    color: var(--teal); border: 1px solid rgba(48,176,176,0.35);
    background: rgba(48,176,176,0.08); text-shadow: 0 0 8px rgba(48,176,176,0.5);
  }

  /* ── PILLS ── */
  .pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 22px; }
  .pill {
    border: 1px solid rgba(48,176,176,0.3); background: rgba(48,176,176,0.07);
    color: var(--teal); font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; padding: 7px 15px; border-radius: 999px;
  }

  /* ── CTA ── */
  .cta-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: rgba(80,144,144,0.5); margin-bottom: 8px; }
  .cta-url { font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 700; color: #dff0f0; letter-spacing: 1.5px; text-shadow: 0 0 16px rgba(48,176,176,0.4); }
  .cta-url span { color: var(--teal); }

  .handle {
    position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
    z-index: 26; font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 4px; text-transform: uppercase; color: rgba(80,144,144,0.45);
    white-space: nowrap;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="vignette"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="status">
  <div class="status-dot"></div>
  <div class="status-txt" id="status-txt">Swift Online</div>
</div>

<div class="data-left">SWIFT_DESIGNZ · WEB · ECOMMERCE · APPS · PM_TRAINING · AI_TRAINING</div>
<div class="data-right">QUALITY · SPEED · RESULTS · REMOTE · WORLDWIDE · BILLED_ZAR</div>

<div class="overlay">
  <div class="card" id="card"></div>
</div>

<div class="handle">@swiftdesignz101</div>

<script>
// ── CANVAS BACKGROUND (same space warp) ──────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = 1080, H = canvas.height = 1080;
const cx = W/2, cy = H/2;
const TR=48, TG=176, TB=176;
const N_STARS=700, MAX_Z=950;
function mkStar(init){const z=init?Math.random()*MAX_Z:MAX_Z;return{x:(Math.random()-.5)*W*1.9,y:(Math.random()-.5)*H*1.9,z,pz:z,size:.3+Math.random()*1.8,col:Math.random()};}
let stars=Array.from({length:N_STARS},()=>mkStar(true));
let warpRings=[],lastRing=0;
const HUD=[{r:400,rot:0,rotSpd:.003,segs:4,gapFrac:.28,lw:.7,a:.07},{r:300,rot:2.1,rotSpd:-.0048,segs:3,gapFrac:.35,lw:.6,a:.055},{r:490,rot:4.5,rotSpd:.0018,segs:5,gapFrac:.18,lw:.5,a:.045}];
const PKTS=Array.from({length:24},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.55,vy:(Math.random()-.5)*.55,w:16+Math.random()*44,h:5+Math.random()*8,op:.04+Math.random()*.07,ph:Math.random()*Math.PI*2,freq:.018+Math.random()*.032}));
let streaks=[],lastStreak=0,warpSpd=4,frame=0,scanY=0,comets=[],blasts=[],lastComet=0;
function mkComet(){const side=Math.floor(Math.random()*4);let sx,sy;if(side===0){sx=Math.random()*W;sy=-20;}else if(side===1){sx=W+20;sy=Math.random()*H;}else if(side===2){sx=Math.random()*W;sy=H+20;}else{sx=-20;sy=Math.random()*H;}const tx=cx+(Math.random()-.5)*700,ty=cy+(Math.random()-.5)*700,dx=tx-sx,dy=ty-sy,d=Math.sqrt(dx*dx+dy*dy)||1,spd=5+Math.random()*7;return{x:sx,y:sy,vx:(dx/d)*spd,vy:(dy/d)*spd,px:-(dy/d),py:(dx/d),zAmp:18+Math.random()*52,zFreq:.055+Math.random()*.095,zPhase:Math.random()*Math.PI*2,trail:[],t:0,ttl:65+Math.floor(Math.random()*80)};}
function boom(x,y){const n=14+Math.floor(Math.random()*24);for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2+Math.random()*.6,spd=1+Math.random()*8;blasts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,decay:.016+Math.random()*.028,size:.5+Math.random()*3,flash:Math.random()>.62});}}
function render(ts){
  frame++;if(warpSpd<5.5)warpSpd+=.01;
  ctx.fillStyle='rgba(3,7,10,0.88)';ctx.fillRect(0,0,W,H);
  const breathe=.5+.5*Math.sin(frame*.018);
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,220+breathe*55);cg.addColorStop(0,`rgba(${TR},${TG},${TB},${.055+breathe*.04})`);cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
  for(const s of stars){s.pz=s.z;s.z-=warpSpd;if(s.z<=1){s.x=(Math.random()-.5)*W*1.9;s.y=(Math.random()-.5)*H*1.9;s.z=MAX_Z;s.pz=MAX_Z;continue;}const sx=(s.x/s.z)*cx+cx,sy=(s.y/s.z)*cy+cy,px=(s.x/s.pz)*cx+cx,py=(s.y/s.pz)*cy+cy;if(sx<-20||sx>W+20||sy<-20||sy>H+20){s.z=1;continue;}const t=1-s.z/MAX_Z,rr=Math.floor(TR+(220-TR)*t*s.col),gg=Math.floor(TG+(225-TG)*t*(.7+s.col*.3)),bb=Math.floor(TB+(215-TB)*t*.55),alpha=Math.min(1,t*1.7+.04),lw=s.size*(.4+t*1.8);ctx.save();ctx.strokeStyle=`rgba(${rr},${gg},${bb},${alpha})`;ctx.lineWidth=lw;if(t>.65){ctx.shadowBlur=lw*5;ctx.shadowColor=`rgba(${TR},${TG},${TB},.55)`;}ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(sx,sy);ctx.stroke();ctx.restore();}
  if(warpSpd>7&&ts-lastRing>1050){warpRings.push({r:5,op:.6,spd:7+Math.random()*7});lastRing=ts;}
  warpRings=warpRings.filter(function(ring){ring.r+=ring.spd;ring.op-=.014;if(ring.op<=0)return false;ctx.save();ctx.globalAlpha=ring.op;ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;ctx.lineWidth=1.3;ctx.shadowBlur=10;ctx.shadowColor=`rgba(${TR},${TG},${TB},.8)`;ctx.beginPath();ctx.arc(cx,cy,ring.r,0,Math.PI*2);ctx.stroke();ctx.restore();return true;});
  for(const h of HUD){h.rot+=h.rotSpd;ctx.save();ctx.globalAlpha=h.a*(.55+.45*breathe);ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;ctx.lineWidth=h.lw;const span=(Math.PI*2/h.segs)*(1-h.gapFrac);for(let i=0;i<h.segs;i++){const start=h.rot+i*(Math.PI*2/h.segs);ctx.beginPath();ctx.arc(cx,cy,h.r,start,start+span);ctx.stroke();}ctx.restore();}
  if(ts-lastStreak>600+Math.random()*800){const ang=Math.random()*Math.PI*2,fromR=50+Math.random()*80,toR=fromR+60+Math.random()*140;streaks.push({x1:cx+Math.cos(ang)*fromR,y1:cy+Math.sin(ang)*fromR,x2:cx+Math.cos(ang)*toR,y2:cy+Math.sin(ang)*toR,life:1,lw:.8+Math.random()*1.4});lastStreak=ts;}
  streaks=streaks.filter(function(s){s.life-=.055;if(s.life<=0)return false;ctx.save();ctx.globalAlpha=s.life*.8;ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;ctx.lineWidth=s.lw;ctx.shadowBlur=8;ctx.shadowColor=`rgba(${TR},${TG},${TB},.9)`;ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();ctx.restore();return true;});
  if(ts-lastComet>2000+Math.random()*3000){comets.push(mkComet());lastComet=ts;}
  for(let i=comets.length-1;i>=0;i--){const c=comets[i];c.t++;const zOff=c.zAmp*Math.sin(c.zFreq*c.t+c.zPhase),hx=c.x+c.px*zOff,hy=c.y+c.py*zOff;c.trail.push({x:hx,y:hy});if(c.trail.length>28)c.trail.shift();c.x+=c.vx;c.y+=c.vy;const alive=c.t<c.ttl&&hx>-80&&hx<W+80&&hy>-80&&hy<H+80;if(!alive){boom(hx,hy);comets.splice(i,1);continue;}const fade=1-c.t/c.ttl;for(let j=1;j<c.trail.length;j++){const tf=j/c.trail.length;ctx.save();ctx.globalAlpha=tf*.80*fade;ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;ctx.lineWidth=tf*2.4;ctx.shadowBlur=tf*14;ctx.shadowColor=`rgba(${TR},${TG},${TB},.85)`;ctx.beginPath();ctx.moveTo(c.trail[j-1].x,c.trail[j-1].y);ctx.lineTo(c.trail[j].x,c.trail[j].y);ctx.stroke();ctx.restore();}ctx.save();ctx.globalAlpha=fade*.95;ctx.fillStyle='rgba(195,250,250,1)';ctx.shadowBlur=22;ctx.shadowColor=`rgba(${TR},${TG},${TB},1)`;ctx.beginPath();ctx.arc(hx,hy,2.8,0,Math.PI*2);ctx.fill();ctx.restore();}
  for(let i=blasts.length-1;i>=0;i--){const p=blasts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.life-=p.decay;if(p.life<=0){blasts.splice(i,1);continue;}ctx.save();ctx.globalAlpha=p.life*(p.flash?.90:.52);ctx.fillStyle=p.flash?'rgba(200,252,252,1)':`rgba(${TR},${TG},${TB},1)`;if(p.flash){ctx.shadowBlur=12;ctx.shadowColor=`rgba(${TR},${TG},${TB},1)`;}ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();ctx.restore();}
  for(const p of PKTS){p.x+=p.vx;p.y+=p.vy;p.ph+=p.freq;if(p.x<-70)p.x=W+50;if(p.x>W+70)p.x=-50;if(p.y<-70)p.y=H+50;if(p.y>H+70)p.y=-50;const alpha=p.op*(.35+.65*Math.abs(Math.sin(p.ph)));ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;ctx.lineWidth=.7;ctx.strokeRect(p.x,p.y,p.w,p.h);ctx.fillStyle=`rgba(${TR},${TG},${TB},.12)`;ctx.fillRect(p.x+1,p.y+1,p.w-2,p.h-2);ctx.restore();}
  scanY=(scanY+1.5)%H;ctx.save();ctx.globalAlpha=.05;ctx.strokeStyle=`rgba(${TR},${TG},${TB},1)`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,scanY);ctx.lineTo(W,scanY);ctx.stroke();ctx.restore();
  const dp=.5+.5*Math.sin(frame*.045);ctx.save();ctx.globalAlpha=.55+.45*dp;ctx.beginPath();ctx.arc(cx,cy,3.5,0,Math.PI*2);ctx.fillStyle=`rgba(${TR},${TG},${TB},1)`;ctx.shadowBlur=28;ctx.shadowColor=`rgba(${TR},${TG},${TB},1)`;ctx.fill();ctx.restore();
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── CARD DATA ────────────────────────────────────────────────────────────────
const CARD_DATA = [
  {
    status: 'Services Online', badge: 'What We Build',
    hl1: 'BUILD YOUR', hl2: 'DIGITAL FUTURE.',
    sub: 'Web. Mobile. E-Commerce. AI.',
    type: 'pills',
    pills: ['Web Apps', 'E-Commerce Stores', 'Mobile Apps', 'SaaS Platforms', 'AI Training', 'PM Training'],
    tiers: null, ba: null, cta: false, promo: null,
  },
  {
    status: 'Packages Live', badge: 'Transparent Pricing',
    hl1: 'QUALITY AT', hl2: 'ANY BUDGET.',
    sub: 'No surprises. Just results.',
    type: 'tiers',
    tiers: [
      { name: 'Websites From',      price: 'R2,500' },
      { name: 'Online Stores From', price: 'R4,000' },
      { name: 'Mobile Apps From',   price: 'R5,000' },
      { name: 'Training From',      price: 'R1,500' },
    ],
    pills: null, ba: null, cta: false, promo: null,
  },
  {
    status: 'Results Delivered', badge: 'Client Transformations',
    hl1: 'FROM ZERO', hl2: 'TO LAUNCHED.',
    sub: 'Real results. Real clients.',
    type: 'ba',
    ba: [
      { before: 'No Website',      after: 'Live in 2 Weeks' },
      { before: 'Manual Process',  after: 'Custom App Built' },
      { before: 'Losing Clients',  after: 'Pro Online Presence' },
      { before: 'No Online Store', after: 'Selling 24/7' },
    ],
    tiers: null, pills: null, cta: false, promo: null,
  },
  {
    status: 'Swift Online', badge: 'Why Swift Hits Different',
    hl1: 'REMOTE.', hl2: 'LEGENDARY.',
    sub: 'Degree-level quality. Startup speed.',
    type: 'pills',
    pills: ['BSc Soft. Eng.', '2+ Yrs Web Dev', '1+ Yr App Dev', '7 Happy Clients', '2 Countries', 'Always On Time'],
    tiers: null, ba: null, cta: false, promo: null,
  },
  {
    status: 'Limited Offer', badge: 'April 2026',
    hl1: 'FREE 3-MONTH', hl2: 'HOSTING.',
    sub: 'New website clients — this month only.',
    type: 'cta', promo: 'LIMITED — APRIL 2026',
    tiers: null, pills: null, ba: null, cta: true,
  },
];

// ── RENDER CARD FROM URL PARAM ───────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const idx    = Math.min(Math.max(parseInt(params.get('card') || '0', 10), 0), CARD_DATA.length - 1);
const d      = CARD_DATA[idx];

document.getElementById('status-txt').textContent = d.status;

const card = document.getElementById('card');

// Badge
card.innerHTML = `
  <div class="svc-badge">
    <div class="badge-dot"></div>
    <div class="badge-txt">${d.badge}</div>
  </div>
  <div class="logo-wrap">
    <div class="logo-halo"></div>
    <img class="logo-img" src="images/favicon.png" alt="Swift Designz"/>
  </div>
  ${d.promo ? `<div class="promo-tag">${d.promo}</div>` : ''}
  <div class="headline">${d.hl1}<br/><em>${d.hl2}</em></div>
  <div class="sub">${d.sub}</div>
  <div class="divider"></div>
  ${d.type === 'tiers' ? `<div class="pricing">${d.tiers.map(t => `<div class="tier-row"><span class="tier-name">${t.name}</span><span class="tier-price">${t.price}</span></div>`).join('')}</div>` : ''}
  ${d.type === 'pills' ? `<div class="pills">${d.pills.map(p => `<div class="pill">${p}</div>`).join('')}</div>` : ''}
  ${d.type === 'ba'    ? `<div class="ba-rows">${d.ba.map(r => `<div class="ba-row"><span class="ba-before">${r.before}</span><span class="ba-arrow">&#8594;</span><span class="ba-after">${r.after}</span></div>`).join('')}</div>` : ''}
  ${d.cta ? `<div><div class="cta-label">Start your project today</div><div class="cta-url"><span>swift</span>designz.co.za</div></div>` : ''}
`;
</script>
</body>
</html>
