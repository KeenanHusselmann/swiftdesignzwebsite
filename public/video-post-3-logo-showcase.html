<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080" />
<title>Post 3 — Logo Showcase</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0d0d0d;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }

  /* ── KEYFRAMES ── */
  @keyframes spin-slow  { to { transform: rotate(360deg); } }
  @keyframes spin-ccw   { to { transform: rotate(-360deg); } }
  @keyframes shimmer {
    0%   { background-position: -300% center; }
    100% { background-position: 300% center; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fav-pulse {
    0%, 100% {
      transform: translate(-50%, -50%) scale(1);
      filter: drop-shadow(0 0 36px rgba(245,158,11,0.75)) drop-shadow(0 0 72px rgba(48,176,176,0.45));
    }
    50% {
      transform: translate(-50%, -50%) scale(1.18);
      filter: drop-shadow(0 0 72px rgba(245,158,11,1)) drop-shadow(0 0 140px rgba(48,176,176,0.8));
    }
  }
  /* the orbit arm itself spins */
  @keyframes orbit-arm {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }
  /* the orbiting favicon counter-spins so it stays upright */
  @keyframes fav-counter {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-360deg); }
  }
  @keyframes ring-spin  { to { transform: translate(-50%, -50%) rotate(360deg); } }
  @keyframes ring-spin-ccw { to { transform: translate(-50%, -50%) rotate(-360deg); } }
  @keyframes outer-spin { to { transform: translate(-50%, -50%) rotate(-360deg); } }
  @keyframes progress {
    from { width: 0%; }
    to   { width: 100%; }
  }
  @keyframes amber-bg-pulse {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 1.0; }
  }
  @keyframes pill-in {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── BACKGROUND ── */
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 45%, rgba(245,158,11,0.20) 0%, rgba(48,176,176,0.10) 40%, #0d0d0d 68%),
      radial-gradient(ellipse 50% 30% at 10% 90%, rgba(48,176,176,0.08) 0%, transparent 55%),
      radial-gradient(ellipse 50% 30% at 90% 10%, rgba(245,158,11,0.06) 0%, transparent 55%),
      #0d0d0d;
  }
  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(60deg,  rgba(245,158,11,0.038) 0, rgba(245,158,11,0.038) 1px, transparent 1px, transparent 38px),
      repeating-linear-gradient(120deg, rgba(245,158,11,0.038) 0, rgba(245,158,11,0.038) 1px, transparent 1px, transparent 38px);
  }
  /* ambient glow blob behind logo area */
  .bg::after {
    content: '';
    position: absolute;
    top: 20%; left: 50%; transform: translateX(-50%);
    width: 800px; height: 800px;
    background: radial-gradient(ellipse, rgba(245,158,11,0.12) 0%, transparent 65%);
    filter: blur(80px);
    animation: amber-bg-pulse 4s ease-in-out infinite;
  }

  /* ── DATE TAG ── */
  .date-tag {
    position: absolute;
    top: 80px; left: 0; right: 0;
    text-align: center;
    font-size: 22px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(245,158,11,0.5);
    animation: fadeUp 0.5s 0.1s ease both;
  }

  /* ── RING SYSTEM ── */
  /* all rings are absolutely centered at 50% × 42% */
  .ring {
    position: absolute;
    top: 42%; left: 50%;
    border-radius: 50%;
    border-style: solid;
    border-color: transparent;
  }
  .ring-1 {
    width: 720px; height: 720px;
    margin: -360px 0 0 -360px;
    border-width: 1px;
    border-color: rgba(245,158,11,0.15);
    animation: ring-spin-ccw 28s linear infinite;
  }
  .ring-2 {
    width: 600px; height: 600px;
    margin: -300px 0 0 -300px;
    border-width: 3px;
    /* conic gradient ring trick */
    background: conic-gradient(from 0deg, #F59E0B 0%, #30B0B0 50%, #F59E0B 100%) border-box;
    border-color: transparent;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: ring-spin 10s linear infinite;
  }
  .ring-3 {
    width: 460px; height: 460px;
    margin: -230px 0 0 -230px;
    border-width: 1px;
    border-color: rgba(48,176,176,0.22);
    border-style: dashed;
    animation: ring-spin-ccw 16s linear infinite;
  }
  .ring-4 {
    width: 340px; height: 340px;
    margin: -170px 0 0 -170px;
    border-width: 2px;
    border-color: rgba(245,158,11,0.18);
    animation: ring-spin 12s linear infinite;
  }

  /* ── ORBIT ARM + ORBITING FAVICON ── */
  .orbit-arm {
    position: absolute;
    top: 42%; left: 50%;
    width: 600px; height: 600px;
    margin: -300px 0 0 -300px;
    border-radius: 50%;
    /* arm itself is invisible, just a rotator */
    animation: spin-slow 10s linear infinite;
  }
  /* the orbiting favicon sits at top-center of the arm div */
  .orbit-fav {
    position: absolute;
    top: -44px; left: 50%;
    width: 88px; height: 88px;
    margin-left: -44px;
    border-radius: 22px;
    object-fit: cover;
    animation: spin-ccw 10s linear infinite; /* counter-rotate = stays upright */
    filter: drop-shadow(0 0 18px rgba(245,158,11,0.9)) drop-shadow(0 0 36px rgba(48,176,176,0.6));
  }

  /* ── CENTER FAVICON (pulsing) ── */
  .center-fav {
    position: absolute;
    top: 42%; left: 50%;
    width: 190px; height: 190px;
    border-radius: 42px;
    object-fit: cover;
    animation: fav-pulse 2.8s ease-in-out infinite;
    z-index: 5;
  }

  /* ── BRAND TEXT ── */
  .brand-name {
    position: absolute;
    top: 67%; left: 0; right: 0;
    text-align: center;
    font-size: 78px;
    font-weight: 900;
    letter-spacing: 8px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #FBBF24 0%, #F59E0B 35%, #30B0B0 70%, #FBBF24 100%);
    background-size: 300% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 5s linear infinite, fadeUp 0.8s 0.6s ease both;
  }
  .brand-tagline {
    position: absolute;
    top: 73.5%; left: 0; right: 0;
    text-align: center;
    font-size: 22px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    animation: fadeUp 0.8s 0.75s ease both;
  }

  /* ── AMBER DIVIDER ── */
  .divider {
    position: absolute;
    top: 78%; left: 50%;
    width: 300px; height: 2px;
    transform: translateX(-50%);
    background: linear-gradient(90deg, transparent, #F59E0B, #30B0B0, transparent);
    animation: fadeUp 0.7s 0.9s ease both;
  }

  /* ── URL ── */
  .url {
    position: absolute;
    top: 80%; left: 0; right: 0;
    text-align: center;
    font-size: 34px;
    font-weight: 700;
    color: #30B0B0;
    letter-spacing: 3px;
    text-shadow: 0 0 28px rgba(48,176,176,0.8);
    animation: fadeUp 0.7s 1.0s ease both;
  }

  /* ── SERVICE PILLS ── */
  .pills {
    position: absolute;
    top: 85.5%; left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    padding: 0 80px;
  }
  .pill {
    padding: 18px 40px;
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 60px;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    background: rgba(245,158,11,0.06);
    opacity: 0;
    animation: pill-in 0.5s ease forwards;
  }
  .pill:nth-child(1) { animation-delay: 1.1s; }
  .pill:nth-child(2) { animation-delay: 1.3s; }
  .pill:nth-child(3) { animation-delay: 1.5s; }

  /* ── FOOTER ── */
  .footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to right, rgba(245,158,11,0.1), rgba(48,176,176,0.1));
    border-top: 1px solid rgba(245,158,11,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    opacity: 0;
    animation: fadeUp 0.7s 1.7s ease forwards;
  }
  .footer-dot {
    width: 6px; height: 6px;
    background: #F59E0B;
    border-radius: 50%;
    opacity: 0.6;
  }
  .footer-text {
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    position: absolute;
    bottom: 120px; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #F59E0B, #30B0B0);
    animation: progress 15s linear infinite;
    opacity: 0.35;
  }
</style>
</head>
<body>

  <div class="bg"></div>

  <div class="date-tag">March 27, 2026</div>

  <!-- concentric rings -->
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="ring ring-4"></div>

  <!-- orbiting favicon on ring-2 path -->
  <div class="orbit-arm">
    <img src="images/favicon.png" alt="" class="orbit-fav" />
  </div>

  <!-- center favicon (pulsing) -->
  <img src="images/favicon.png" alt="Swift Designz" class="center-fav" />

  <!-- brand text -->
  <div class="brand-name">Swift Designz</div>
  <div class="brand-tagline">Crafting Digital Excellence</div>
  <div class="divider"></div>
  <div class="url">swiftdesignz.co.za</div>

  <!-- service pills -->
  <div class="pills">
    <span class="pill">Web Design</span>
    <span class="pill">E-Commerce</span>
    <span class="pill">Apps &amp; Software</span>
  </div>

  <div class="progress-bar"></div>

  <div class="footer">
    <span class="footer-dot"></span>
    <span class="footer-text">@swiftdesignz101</span>
    <span class="footer-dot"></span>
    <span class="footer-text">PM Training</span>
    <span class="footer-dot"></span>
    <span class="footer-text">AI Training</span>
    <span class="footer-dot"></span>
  </div>

</body>
</html>
